<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b141a">
<title>OIO ONE PRO</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/libsignal-protocol@0.0.11/dist/libsignal-protocol.js"></script>

<style>
:root {
  --g:#25d366; --g2:#128c7e; --bg:#0b141a; --s:#111b21;
  --c:#202c33; --card:#2a3942; --bdr:rgba(255,255,255,.07);
  --txt:#e9edef; --mu:#8696a0; --sent:#005c4b; --recv:#202c33;
  --ff:'Nunito', sans-serif; --ff-h:'Rajdhani', sans-serif;
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

/* AJUSTE PARA ECRÃ CHEIO NO TELEMÓVEL */
html, body { 
  height: 100dvh; width: 100vw; overflow: hidden; position: fixed;
  background: var(--bg); color: var(--txt); font-family: var(--ff);
  display: flex; flex-direction: column;
}

#bg-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.4; }

#topo {
  background: rgba(17, 27, 33, 0.9); backdrop-filter: blur(15px);
  padding: calc(env(safe-area-inset-top,0) + 12px) 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--bdr); flex-shrink: 0;
}
.logo { font-family: var(--ff-h); font-weight: 700; font-size: 1.3rem; letter-spacing: 2px; color: #fff; }
.logo span { color: var(--g); border: 1px solid var(--g); padding: 0 5px; border-radius: 4px; margin-left: 6px; font-size: 0.75rem; vertical-align: middle; }

.topo-actions { display: flex; gap: 20px; }
.t-btn { font-size: 1.4rem; color: var(--mu); cursor: pointer; }
.t-btn.active { color: var(--g); }

/* ÁREA DE CONTEÚDO QUE OCUPA O RESTO DO ECRÃ */
#main-content {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}

#msgs {
  flex: 1; overflow-y: auto; padding: 15px;
  display: flex; flex-direction: column; gap: 12px;
  background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
  background-size: 400px;
}

#controls {
  background: var(--s); padding: 12px 15px calc(env(safe-area-inset-bottom, 0px) + 12px);
  display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--bdr);
}
#msgInput {
  flex: 1; background: var(--card); border: none; border-radius: 25px;
  padding: 12px 20px; color: #fff; font-size: 1rem; outline: none;
}
.s-btn { 
  background: var(--g2); color: #fff; border: none; 
  width: 48px; height: 48px; border-radius: 50%; font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center;
}

#tst {
  position: fixed; top: 110px; left: 50%; transform: translateX(-50%);
  background: var(--g2); color: #fff; padding: 10px 22px;
  border-radius: 20px; font-weight: 600; font-size: 0.85rem;
  z-index: 10000; display: none;
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="tst"></div>

<header id="topo">
  <div class="logo">OIO ONE<span>FAMÍLIA</span></div>
  <div class="topo-actions">
    <i class="fa-solid fa-circle-plus t-btn" onclick="toast('Stories em breve')"></i>
    <i class="fa-solid fa-video t-btn" onclick="toast('Videochamada em breve')"></i>
    <i class="fa-solid fa-comment-dots t-btn active"></i>
  </div>
</header>

<main id="main-content">
  <div id="msgs"></div>
  
  <div id="controls">
    <i class="fa-solid fa-microphone t-btn" onclick="toast('Áudio em breve')"></i>
    <input type="text" id="msgInput" placeholder="Conversar com a família...">
    <button class="s-btn" onclick="enviar()"><i class="fa-solid fa-paper-plane"></i></button>
  </div>
</main>

<script>
const SB_URL = 'https://uqdwtzlkqaosnweyoyit.supabase.co';
const SB_KEY = 'sb_publishable_uafBQD1aJ3w8_eq4meOsNQ_wzk8TwhA';
const sb = supabase.createClient(SB_URL, SB_KEY);

let meuNome = localStorage.getItem('oio_user');
if(!meuNome) {
  meuNome = prompt("Qual é o seu nome?") || "Membro";
  localStorage.setItem('oio_user', meuNome);
}

const KeyHelper = libsignal.KeyHelper;

async function initCrypto() {
  if (!localStorage.getItem('oio_idkey')) {
    const identity = await KeyHelper.generateIdentityKeyPair();
    localStorage.setItem('oio_idkey', JSON.stringify(identity));
  }
}

async function enviar() {
  const input = document.getElementById('msgInput');
  const texto = input.value.trim();
  if (!texto) return;

  // Enviar para o Supabase
  const { error } = await sb.from('messages').insert([
    { author: meuNome, content: texto, chat_room: 'Geral' }
  ]);

  if (!error) { input.value = ''; }
}

// Escuta em tempo real
sb.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
  renderMsg(payload.new);
}).subscribe();

function renderMsg(m) {
  const wrap = document.getElementById('msgs');
  const isMe = m.author === meuNome;
  const div = document.createElement('div');
  div.style.cssText = `
    align-self: ${isMe ? 'flex-end' : 'flex-start'};
    background: ${isMe ? 'var(--sent)' : 'var(--recv)'};
    padding: 10px 14px; border-radius: 15px; max-width: 85%;
    margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  `;
  div.innerHTML = `<div style="font-size:0.7rem; color:var(--g); font-weight:800;">${m.author}</div><div style="font-size:1rem;">${m.content}</div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function toast(m) {
  const t = document.getElementById('tst');
  t.textContent = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

function initVisuals() {
  const c = document.getElementById('bg-canvas');
  const ctx = c.getContext('2d');
  let w, h, pts = [];
  const resize = () => { w = c.width = window.innerWidth; h = c.height = window.innerHeight; };
  window.addEventListener('resize', resize);
  resize();
  for(let i=0; i<6; i++) pts.push({x:Math.random()*w, y:Math.random()*h, r:Math.random()*50+30, vx:Math.random()*0.4-0.2, vy:Math.random()*0.4-0.2});
  function anim() {
    ctx.clearRect(0,0,w,h);
    pts.forEach(p => {
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>w) p.vx*=-1; if(p.y<0||p.y>h) p.vy*=-1;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(37, 211, 102, 0.05)'; ctx.fill();
    });
    requestAnimationFrame(anim);
  }
  anim();
}

window.onload = () => {
  initVisuals();
  initCrypto();
  // Carregar mensagens antigas
  sb.from('messages').select('*').order('created_at', { ascending: true }).limit(20).then(({data}) => {
    if(data) data.forEach(renderMsg);
  });
};
</script>
</body>
</html>
