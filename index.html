<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b141a">
<title>OIO ONE PRO</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/libsignal-protocol@0.0.11/dist/libsignal-protocol.js"></script>

<style>
:root {
  --g:#25d366; --g2:#128c7e; --bg:#0b141a; --s:#111b21;
  --c:#202c33; --card:#2a3942; --bdr:rgba(255,255,255,.07);
  --txt:#e9edef; --mu:#8696a0; --sent:#005c4b; --recv:#202c33;
  --ff:'Nunito', sans-serif; --ff-h:'Rajdhani', sans-serif;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height: 100dvh; width: 100vw; overflow: hidden; position: fixed; background: var(--bg); color: var(--txt); font-family: var(--ff); display: flex; flex-direction: column; }
#bg-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.4; }
#topo { background: rgba(17, 27, 33, 0.95); backdrop-filter: blur(15px); padding: calc(env(safe-area-inset-top,0) + 12px) 16px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--bdr); flex-shrink: 0; }
.logo { font-family: var(--ff-h); font-weight: 700; font-size: 1.3rem; letter-spacing: 2px; color: #fff; }
.logo span { color: var(--g); border: 1px solid var(--g); padding: 0 5px; border-radius: 4px; margin-left: 6px; font-size: 0.75rem; vertical-align: middle; }
.topo-actions { display: flex; gap: 20px; }
.t-btn { font-size: 1.4rem; color: var(--mu); cursor: pointer; }
.t-btn.active { color: var(--g); }
#main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: 400px; }
#controls { background: var(--s); padding: 12px 15px calc(env(safe-area-inset-bottom, 0px) + 12px); display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--bdr); }
#msgInput { flex: 1; background: var(--card); border: none; border-radius: 25px; padding: 12px 20px; color: #fff; font-size: 1rem; outline: none; }
.s-btn { background: var(--g2); color: #fff; border: none; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0;}
#tst { position: fixed; top: 110px; left: 50%; transform: translateX(-50%); background: var(--g2); color: #fff; padding: 10px 22px; border-radius: 20px; font-weight: 600; font-size: 0.85rem; z-index: 10000; display: none; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="tst"></div>

<header id="topo">
  <div class="logo">OIO ONE<span>FAMÍLIA</span></div>
  <div class="topo-actions">
    <i class="fa-solid fa-wand-magic-sparkles t-btn" title="Vibe IA" onclick="gerarDailyIA()"></i>
    <i class="fa-solid fa-video t-btn" onclick="tocarChamada()"></i>
    <i class="fa-solid fa-comment-dots t-btn active" style="color:var(--g)"></i>
  </div>
</header>

<main id="main-content">
  <div id="msgs"></div>
  <div id="controls">
    <i class="fa-solid fa-camera t-btn" onclick="toast('Câmera em breve')"></i>
    <i class="fa-solid fa-microphone t-btn" onclick="tocarSomAudio()"></i>
    <input type="text" id="msgInput" placeholder="Mensagem para a família...">
    <button class="s-btn" onclick="enviar()"><i class="fa-solid fa-paper-plane"></i></button>
  </div>
</main>

<script>
// --- CONFIGURAÇÃO ---
const SB_URL = 'https://uqdwtzlkqaosnweyoyit.supabase.co';
const SB_KEY = 'sb_publishable_uafBQD1aJ3w8_eq4meOsNQ_wzk8TwhA';
const sb = supabase.createClient(SB_URL, SB_KEY);

// --- OBJETOS DE SOM PREMIUM ---
const somMsg = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3'); // Receber
const somEnviado = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3'); // Enviar
const somChamada = new Audio('https://assets.mixkit.co/active_storage/sfx/1353/1353-preview.mp3'); // Chamada Ringtone
const somMic = new Audio('https://assets.mixkit.co/active_storage/sfx/2569/2569-preview.mp3'); // Click Mic

let meuNome = localStorage.getItem('oio_user') || 'Membro';
if(meuNome === 'Membro') { meuNome = prompt("Como te chamas?") || 'Membro'; localStorage.setItem('oio_user', meuNome); }

const KeyHelper = libsignal.KeyHelper;
async function initCrypto() {
  if (!localStorage.getItem('oio_idkey')) {
    const identity = await KeyHelper.generateIdentityKeyPair();
    localStorage.setItem('oio_idkey', JSON.stringify(identity));
  }
}

// --- FUNÇÕES DE SOM ---
function tocarSomAudio() { somMic.play(); toast("Áudio em breve..."); }
function tocarChamada() { somChamada.loop = true; somChamada.play(); toast("Chamada recebida..."); setTimeout(() => { somChamada.pause(); somChamada.currentTime = 0; }, 5000); }

async function enviar() {
  const input = document.getElementById('msgInput');
  const texto = input.value.trim();
  if (!texto) return;
  const { error } = await sb.from('messages').insert([{ author: meuNome, content: texto, chat_room: 'Geral' }]);
  if (!error) { 
    input.value = ''; 
    somEnviado.play(); // Som de mensagem enviada
  }
}

sb.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
  renderMsg(payload.new, true);
}).subscribe();

function renderMsg(m, isNew = false) {
  const wrap = document.getElementById('msgs');
  const isMe = m.author === meuNome;
  if (isNew && !isMe) {
    somMsg.play().catch(() => {}); // Som de recebimento
    if (navigator.vibrate) navigator.vibrate(100);
  }
  const div = document.createElement('div');
  div.style.cssText = `align-self:${isMe?'flex-end':'flex-start'}; background:${isMe?'var(--sent)':'var(--recv)'}; padding:10px 14px; border-radius:15px; max-width:85%; margin-bottom:8px; box-shadow: 0 1px 2px rgba(0,0,0,0.3);`;
  div.innerHTML = `<div style="font-size:0.7rem; color:var(--g); font-weight:800;">${m.author}</div><div>${m.content}</div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

// --- API IA DAILY ---
async function gerarDailyIA() {
  toast("🪄 Vibe IA a analisar...");
  // Simulação da lógica da IA Daily integrada
  setTimeout(() => toast("Insights gerados no Daily!"), 2000);
}

function toast(m) {
  const t = document.getElementById('tst');
  t.textContent = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

window.onload = async () => {
  await initCrypto();
  const { data } = await sb.from('messages').select('*').order('created_at', { ascending: true }).limit(20);
  if(data) data.forEach(m => renderMsg(m, false));
  toast("OIO ONE Conectado");
};
</script>
</body>
</html>
