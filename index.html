<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe - OIO ONE Edition</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        /* CSS unificado da sua foto */
        body { margin: 0; background: #000; color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: radial-gradient(circle at top, #001a33, #000); }
        .balao { padding: 10px; border-radius: 15px; max-width: 80%; background: rgba(0,153,255,0.15); border: 1px solid #0044cc; align-self: flex-start; }
        .balao.minha { align-self: flex-end; background: #0066ff; border: none; }
        .balao img { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; }
        .controles { display: flex; gap: 10px; padding: 12px; background: #000; border-top: 1px solid #111; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #111; color: #fff; outline: none; }
        .btn-vibe { color: #0099ff; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="chat"></div>

    <div class="controles">
        <i class="fa-solid fa-camera btn-vibe" onclick="document.getElementById('fotoInput').click()"></i>
        <input id="msgInput" placeholder="Sua vibe..." autocomplete="off">
        <i class="fa-solid fa-paper-plane btn-vibe" onclick="enviar()"></i>
    </div>

    <input type="file" id="fotoInput" accept="image/*" style="display:none">

    <script>
        /* JS unificado da sua foto */
        const config = {
            apiKey: "AIzaSyAkJlFLnzPdwJUbnfJdwvQ3_YFC7A33sAQ",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
            projectId: "vibe-app-bbba2"
        };
        firebase.initializeApp(config);
        const db = firebase.database().ref("chat_vibe");

        let nick = prompt("Identidade OIO ONE - Seu nome:") || "Michel";

        db.limitToLast(25).on("child_added", snap => {
            const m = snap.val();
            const div = document.createElement("div");
            div.className = "balao " + (m.autor === nick ? "minha" : "");
            
            let conteudo = `<b>${m.autor}</b><br>`;
            if(m.url) {
                conteudo += `<img src="${m.url}">`;
            } else {
                conteudo += m.texto;
            }
            
            div.innerHTML = conteudo;
            document.getElementById("chat").appendChild(div);
            document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
        });

        function enviar() {
            const input = document.getElementById("msgInput");
            if(input.value.trim()){
                db.push({ autor: nick, texto: input.value, data: Date.now() });
                input.value = "";
            }
        }

        document.getElementById("fotoInput").onchange = function(e) {
            if(this.files && this.files[0]){
                const reader = new FileReader();
                reader.onload = function(event) {
                    db.push({ autor: nick, texto: "[Foto]", url: event.target.result, data: Date.now() });
                    // Camada Sensorial: Celular vibra ao enviar foto
                    if(navigator.vibrate) navigator.vibrate(100); 
                };
                reader.readAsDataURL(this.files[0]);
            }
        };

        document.getElementById("msgInput").onkeypress = (e) => { if(e.key === "Enter") enviar(); };
    </script>
</body>
</html>
