<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OIO Social</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #18191a;
  color: white;
}

/* topo */
.header {
  background: #242526;
  padding: 10px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* caixa post */
.post-box {
  padding: 10px;
  background: #242526;
  margin: 10px;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 5px;
}

button {
  margin-top: 5px;
  padding: 8px;
  width: 100%;
  border: none;
  background: #1877f2;
  color: white;
  border-radius: 5px;
}

/* post */
.post {
  background: #242526;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

.actions {
  display: flex;
  justify-content: space-around;
  margin-top: 10px;
  border-top: 1px solid #333;
  padding-top: 5px;
}

.comment-box {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">OIO SOCIAL</div>

<div class="post-box">
  <input id="postInput" placeholder="No que você está pensando?">
  <button onclick="addPost()">Postar</button>
</div>

<div id="feed"></div>

<script>
let posts = JSON.parse(localStorage.getItem("posts") || "[]");

function render(){
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  posts.reverse().forEach((p, i) => {
    const el = document.createElement("div");
    el.className = "post";

    el.innerHTML = `
      <strong>Michel</strong>
      <p>${p.text}</p>

      <div class="actions">
        <button onclick="like(${i})">❤️ ${p.likes}</button>
        <button onclick="toggleComment(${i})">💬</button>
      </div>

      <div class="comment-box" id="c-${i}" style="display:none">
        <div>${p.comments.map(c => "<p>"+c+"</p>").join("")}</div>
        <input placeholder="Comentar..." onkeypress="comment(event, ${i})">
      </div>
    `;

    feed.appendChild(el);
  });
}

function addPost(){
  const input = document.getElementById("postInput");
  if(!input.value) return;

  posts.push({
    text: input.value,
    likes: 0,
    comments: []
  });

  input.value = "";
  save();
}

function like(i){
  posts[i].likes++;
  save();
}

function toggleComment(i){
  const box = document.getElementById("c-"+i);
  box.style.display = box.style.display === "none" ? "block" : "none";
}

function comment(e, i){
  if(e.key === "Enter"){
    posts[i].comments.push(e.target.value);
    e.target.value = "";
    save();
  }
}

function save(){
  localStorage.setItem("posts", JSON.stringify(posts));
  render();
}

render();
</script>

</body>
</html>
