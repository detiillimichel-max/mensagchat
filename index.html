<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b141a">
<title>OIO ONE · Família</title>
<link rel="manifest" href="/manifest.json">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/libsignal-protocol@0.0.11/dist/libsignal-protocol.js"></script>
</head>
<body>
<div id="progresso"></div>
<canvas id="bg-canvas"></canvas>
<div id="toasts"></div>

<header id="topo">
  <div class="logo">OIO ONE<span class="logo-tag">FAMÍLIA</span></div>
  <div class="topo-actions">
    <i class="fa-solid fa-circle-plus topo-btn" onclick="postarStory()"></i>
    <i class="fa-solid fa-video topo-btn" id="btnFeed" onclick="abrirTela('feed')"></i>
    <i class="fa-solid fa-comment-dots topo-btn ativo" id="btnChat" onclick="abrirTela('chat')"></i>
  </div>
</header>

<div id="familia-bar"></div>

<section class="tela ativa" id="tela-chat">
  <div id="mensagens"></div>
</section>

<section class="tela" id="tela-feed">
  <div class="feed-header">
    <div class="feed-title">DAILY</div>
    <button class="btn-postar" onclick="document.getElementById('videoInput').click()">
      <i class="fa-solid fa-plus"></i> POSTAR
    </button>
  </div>
  <div id="grid-feed"></div>
</section>

<div id="controles">
  <div class="ctrl-btn" onclick="abrirCamera()"><i class="fa-solid fa-camera"></i></div>
  <div class="ctrl-btn" id="btnMic" onclick="toggleGravacao()"><i class="fa-solid fa-microphone"></i></div>
  <input type="text" id="msgInput" placeholder="Mensagem para a família..." autocomplete="off">
  <button class="ctrl-send" onclick="enviar()"><i class="fa-solid fa-paper-plane"></i></button>
</div>

<script src="/assets/js/supabase-config.js"></script>
<script src="/assets/js/crypto.js"></script>
<script src="/assets/js/ui.js"></script>
<script src="/assets/js/app.js"></script>
</body>
</html>
